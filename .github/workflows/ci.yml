name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps
        
      - name: Lint
        working-directory: frontend
        run: npm run lint
        
      - name: Run Tests
        working-directory: frontend
        run: npm run test
        
      - name: Build Test Image
        working-directory: frontend
        run: docker build -t glassradar-frontend:test .

  # Placeholder for Backend Tests (Appwrite Functions / Integration)
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "No backend tests defined yet. Integration tests pending implementation."

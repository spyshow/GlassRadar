x-logging: &x-logging
  logging:
    driver: 'json-file'
    options:
      max-file: '5'
      max-size: '10m'

networks:
  glassradar-net:
    name: ${NETWORK_NAME:-glassradar-net}
    driver: bridge
  runtimes:
    name: ${NETWORK_NAME:-glassradar-net}-runtimes

volumes:
  appwrite-mariadb-dev:
  appwrite-redis-dev:
  appwrite-cache-dev:
  appwrite-uploads-dev:
  appwrite-imports-dev:
  appwrite-certificates-dev:
  appwrite-functions-dev:
  appwrite-sites-dev:
  appwrite-builds-dev:
  appwrite-config-dev:
  timescale-data-dev:

services:
  traefik:
    image: traefik:2.11
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-traefik
    <<: *x-logging
    command:
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-config-dev:/storage/config:ro
      - appwrite-certificates-dev:/storage/certificates:ro
    depends_on:
      - appwrite
    networks:
      - glassradar-net

  appwrite:
    image: appwrite/appwrite:1.8.1
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-appwrite
    <<: *x-logging
    restart: unless-stopped
    networks:
      glassradar-net:
        aliases:
          - appwrite.local
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=${NETWORK_NAME:-glassradar-net}"
      - "traefik.http.services.appwrite_api.loadbalancer.server.port=80"
      - "traefik.http.routers.appwrite_api_http.entrypoints=appwrite_web"
      - "traefik.http.routers.appwrite_api_http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.appwrite_api_http.service=appwrite_api"
    volumes:
      - appwrite-uploads-dev:/storage/uploads:rw
      - appwrite-imports-dev:/storage/imports:rw
      - appwrite-cache-dev:/storage/cache:rw
      - appwrite-config-dev:/storage/config:rw
      - appwrite-certificates-dev:/storage/certificates:rw
      - appwrite-functions-dev:/storage/functions:rw
      - appwrite-sites-dev:/storage/sites:rw
      - appwrite-builds-dev:/storage/builds:rw
    depends_on:
      - mariadb
      - redis
    environment:
      - _APP_ENV
      - _APP_WORKER_PER_CORE
      - _APP_LOCALE
      - _APP_COMPRESSION_MIN_SIZE_BYTES
      - _APP_CONSOLE_WHITELIST_ROOT

services:
  appwrite:
    image: ${APPWRITE_IMAGE:-appwrite/appwrite:latest}
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-appwrite
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - appwrite-mariadb-${VOLUME_SUFFIX:-dev}:/var/lib/mysql
      - appwrite-uploads-${VOLUME_SUFFIX:-dev}:/storage/uploads
      - appwrite-config-${VOLUME_SUFFIX:-dev}:/storage/config
    networks:
      glassradar-net:
        aliases:
          - appwrite.local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-production}
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - appwrite
    networks:
      glassradar-net:
        aliases:
          - frontend.local

networks:
  glassradar-net:
    name: ${NETWORK_NAME:-glassradar-net}
    driver: bridge

volumes:
  appwrite-mariadb-dev:
    driver: local
  appwrite-uploads-dev:
    driver: local
  appwrite-config-dev:
    driver: local
  appwrite-mariadb-prod:
    driver: local
  appwrite-uploads-prod:
    driver: local
  appwrite-config-prod:
    driver: local

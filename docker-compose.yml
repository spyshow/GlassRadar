services:
  appwrite:
    image: appwrite/appwrite:latest
    container_name: appwrite
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - appwrite-data:/storage
    networks:
      glassradar-net:
        aliases:
          - appwrite.local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: glassradar-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - appwrite
    networks:
      glassradar-net:
        aliases:
          - frontend.local

networks:
  glassradar-net:
    driver: bridge

volumes:
  appwrite-data:
    driver: local

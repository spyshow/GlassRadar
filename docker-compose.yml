      - OPR_EXECUTOR_STORAGE_WASABI_BUCKET=$_APP_STORAGE_WASABI_BUCKET

  mariadb:
    image: mariadb:10.11
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-mariadb
    <<: *x-logging
    restart: unless-stopped
    networks:
      - glassradar-net
    volumes:
      - appwrite-mariadb-dev:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command: 'mysqld --innodb-flush-method=fsync'

  redis:
    image: redis:7.2.4-alpine
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-redis
    <<: *x-logging
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory            512mb
      --maxmemory-policy     allkeys-lru
      --maxmemory-samples    5
    networks:
      - glassradar-net
    volumes:
      - appwrite-redis-dev:/data:rw

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-timescaledb
    <<: *x-logging
    restart: unless-stopped
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    environment:
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD}
      - POSTGRES_USER=${TIMESCALE_USER}
      - POSTGRES_DB=${TIMESCALE_DB}
    volumes:
      - timescale-data-dev:/var/lib/postgresql/data
    networks:
      - glassradar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar}-frontend
    <<: *x-logging
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - appwrite
    networks:
      glassradar-net:
        aliases:
          - frontend.local

services:
  appwrite:
    image: ${APPWRITE_IMAGE:-appwrite/appwrite:latest}
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-appwrite
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - appwrite-mariadb-${VOLUME_SUFFIX:-prod}:/var/lib/mysql
      - appwrite-uploads-${VOLUME_SUFFIX:-prod}:/storage/uploads
      - appwrite-config-${VOLUME_SUFFIX:-prod}:/storage/config
    networks:
      glassradar-net:
        aliases:
          - appwrite.prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-production}
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - appwrite
    networks:
      glassradar-net:
        aliases:
          - frontend.prod

networks:
  glassradar-net:
    name: ${NETWORK_NAME:-glassradar-net-prod}
    driver: bridge

volumes:
  appwrite-mariadb-prod:
    driver: local
  appwrite-uploads-prod:
    driver: local
  appwrite-config-prod:
    driver: local

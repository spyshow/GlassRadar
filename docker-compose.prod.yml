x-logging: &x-logging
  logging:
    driver: 'json-file'
    options:
      max-file: '5'
      max-size: '10m'

networks:
  glassradar-net:
    name: ${NETWORK_NAME:-glassradar-net-prod}
    driver: bridge
  runtimes:
    name: ${NETWORK_NAME:-glassradar-net-prod}-runtimes

volumes:
  appwrite-mariadb-prod:
  appwrite-redis-prod:
  appwrite-cache-prod:
  appwrite-uploads-prod:
  appwrite-imports-prod:
  appwrite-certificates-prod:
  appwrite-functions-prod:
  appwrite-sites-prod:
  appwrite-builds-prod:
  appwrite-config-prod:
  timescaledb-data-prod:

services:
  traefik:
    image: traefik:2.11
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-traefik
    <<: *x-logging
    command:
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-config-prod:/storage/config:ro
      - appwrite-certificates-prod:/storage/certificates:ro
    depends_on:
      - appwrite
    networks:
      - glassradar-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  appwrite:
    image: ${APPWRITE_IMAGE:-appwrite/appwrite:1.8.1}
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-appwrite
    <<: *x-logging
    restart: always
    networks:
      glassradar-net:
        aliases:
          - appwrite.prod
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label-stack=appwrite"
      - "traefik.docker.network=${NETWORK_NAME:-glassradar-net-prod}"
      - "traefik.http.services.appwrite_api.loadbalancer.server.port=80"
      #http
      - "traefik.http.routers.appwrite_api_http.entrypoints=appwrite_web"
      - "traefik.http.routers.appwrite_api_http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.appwrite_api_http.service=appwrite_api"
      # https
      - "traefik.http.routers.appwrite_api_https.entrypoints=appwrite_websecure"
      - "traefik.http.routers.appwrite_api_https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.appwrite_api_https.service=appwrite_api"
      - "traefik.http.routers.appwrite_api_https.tls=true"
    volumes:
      - appwrite-uploads-prod:/storage/uploads:rw
      - appwrite-imports-prod:/storage/imports:rw
      - appwrite-cache-prod:/storage/cache:rw
      - appwrite-config-prod:/storage/config:rw
      - appwrite-certificates-prod:/storage/certificates:rw
      - appwrite-functions-prod:/storage/functions:rw
      - appwrite-sites-prod:/storage/sites:rw
      - appwrite-builds-prod:/storage/builds:rw
    depends_on:
      - mariadb
      - redis
    environment:

      - OPR_EXECUTOR_STORAGE_WASABI_BUCKET=$_APP_STORAGE_WASABI_BUCKET

  mariadb:
    image: mariadb:10.11
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-mariadb
    <<: *x-logging
    restart: always
    networks:
      - glassradar-net
    volumes:
      - appwrite-mariadb-prod:/var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=${_APP_DB_ROOT_PASS}
      - MYSQL_DATABASE=${_APP_DB_SCHEMA}
      - MYSQL_USER=${_APP_DB_USER}
      - MYSQL_PASSWORD=${_APP_DB_PASS}
      - MARIADB_AUTO_UPGRADE=1
    command: 'mysqld --innodb-flush-method=fsync'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2.4-alpine
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-redis
    <<: *x-logging
    restart: always
    command: >
      redis-server
      --maxmemory            512mb
      --maxmemory-policy     allkeys-lru
      --maxmemory-samples    5
    networks:
      - glassradar-net
    volumes:
      - appwrite-redis-prod:/data:rw
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  timescaledb:
    image: timescale/timescaledb:latest-pg18
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-timescaledb
    <<: *x-logging
    restart: always
    networks:
      - glassradar-net
    # Port NOT exposed externally in production — access only via internal network
    environment:
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD}
      - POSTGRES_USER=${TIMESCALE_USER}
      - POSTGRES_DB=${TIMESCALE_DB}
    volumes:
      - timescaledb-data-prod:/var/lib/postgresql
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${DOCKERHUB_USERNAME:-spyshow}/glassradar-frontend:latest
    container_name: ${CONTAINER_NAME_PREFIX:-glassradar-prod}-frontend
    <<: *x-logging
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - appwrite
    networks:
      glassradar-net:
        aliases:
          - frontend.prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
